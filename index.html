    }

    header { text-align: center; padding: 40px 20px; color: white; }

    header p small { display: block; font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }
    .search-box {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .input-group { display: flex; gap: 12px; margin-bottom: 15px; }
    input[type="text"] {
      flex: 1;
      padding: 16px 24px;
      font-size: 1.1rem;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus { border-color: #667eea; }
    button {
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      padding: 6px 14px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag:hover { background: #667eea; color: white; }
    .results {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: none;
    }
    .results.show { display: block; }
    .empty-state { text-align: center; padding: 60px 20px; color: #666; }
    .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
    .empty-state h3 { font-size: 1.3rem; margin-bottom: 10px; color: #333; }
    footer { text-align: center; padding: 40px; color: rgba(255,255,255,0.7); font-size: 0.9rem; }

    /* Country Tabs */
    .country-tabs { display: flex; gap: 6px; margin: 16px 0 0 0; flex-wrap: wrap; }
    .country-tab {
      padding: 8px 16px;
      border: 2px solid #ddd;
      border-radius: 24px;
      background: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      transition: all 0.2s;
      box-shadow: none;
      transform: none;
    }
    .country-tab:hover { border-color: #1976d2; color: #1976d2; transform: none; }
    .country-tab.active {
      background: linear-gradient(135deg, #1976d2, #1565c0);
      border-color: #1565c0;
      color: white;
      box-shadow: 0 2px 8px rgba(25,118,210,0.3);
    }

    /* Result Header */
    .result-header {
      background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .result-title { font-size: 20px; font-weight: 700; color: #1a237e; margin-bottom: 6px; }
    .result-regulations {
      font-size: 12px;
      color: #1565c0;
      background: #e3f2fd;
      padding: 3px 10px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 6px;
    }
    .result-note { font-size: 13px; color: #555; margin-bottom: 8px; }
    .result-meta { font-size: 13px; color: #777; }
    .badge-count { background: #1976d2; color: white; border-radius: 10px; padding: 1px 8px; font-weight: 600; }
    .cat-tag { background: #7b1fa2; color: white; border-radius: 10px; padding: 1px 8px; font-size: 12px; }

    /* Cert Cards */
    .cert-list { display: flex; flex-direction: column; gap: 12px; }
    .cert-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s;
    }
    .cert-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .cert-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .cert-name { font-size: 16px; font-weight: 700; color: #1a237e; }
    .cert-fullname { font-size: 12px; color: #666; margin-bottom: 8px; font-style: italic; }
    .cert-desc { font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 8px; }
    .cert-meta { font-size: 12px; color: #888; }
    .cert-meta span { background: #f5f5f5; padding: 1px 6px; border-radius: 4px; color: #333; }
    .level-required { background: #e8f5e9; color: #2e7d32; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .level-warning { background: #fff8e1; color: #f57f17; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .level-conditional { background: #e3f2fd; color: #1565c0; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.8rem; }
      .input-group { flex-direction: column; }
    }
  </style>

    // 按ID查找认证对象
    function findCertById(id) {
      for (const cat of Object.values(certDB)) {
        for (const cert of cat.certs) {
          if (cert.id === id) return cert;
        }
      }
      return null;
    }

    // 获取某认证所在的分类
    function getCertCategory(id) {
      for (const [key, cat] of Object.entries(certDB)) {
        for (const cert of cat.certs) {
          if (cert.id === id) return { key, name: cat.name };
        }
      }
      return null;
    }

var currentCountry = 'US';

function switchCountry(c) {
  currentCountry = c;
  document.querySelectorAll('.country-tab').forEach(function(b) {
    b.classList.toggle('active', b.dataset.country === c);
  });
  var q = document.getElementById('searchInput').value.trim();
  if (q) displayResults(q);
}

function getCertByIdInDB(id) {
  var db = countryDB[currentCountry];
  if (!db) return null;
  for (var i = 0; i < db.certs.length; i++) {
    if (db.certs[i].id === id) return db.certs[i];
  }
  return null;
}

function searchProducts(query) {
  var q = query.toLowerCase().trim();
  var qWords = q.split(/[\s,，、]+/).filter(function(w){ return w.length > 1; });
  var matchedCerts = {};
  var matchedCategories = [];

  for (var i = 0; i < productMap.length; i++) {
    var entry = productMap[i];
    var hit = false;
    for (var j = 0; j < entry.patterns.length; j++) {
      var p = entry.patterns[j].toLowerCase();
      if (q === p || q.indexOf(p) >= 0 || p.indexOf(q) >= 0) { hit = true; break; }
    }
    if (hit) {
      matchedCategories.push(entry.category || 'kids-general');
      var catCerts = countryProductMap[entry.category] || {};
      var countryCerts = catCerts[currentCountry] || [];
      for (var k = 0; k < countryCerts.length; k++) {
        var cid = countryCerts[k];
        var cert = getCertByIdInDB(cid);
        if (cert) matchedCerts[cid] = cert;
      }
    }
  }

  if (typeof enKeywordCertMap !== 'undefined') {
    for (var kw in enKeywordCertMap) {
      var kwL = kw.toLowerCase();
      if (qWords.indexOf(kwL) >= 0 || q.indexOf(kwL) >= 0) {
        var cids = enKeywordCertMap[kw];
        for (var ci = 0; ci < cids.length; ci++) {
          var cid2 = cids[ci];
          if (!matchedCerts[cid2]) {
            var cert2 = getCertByIdInDB(cid2);
            if (cert2) matchedCerts[cid2] = cert2;
          }
        }
      }
    }
  }

  var certs = [];
  for (var id in matchedCerts) certs.push(matchedCerts[id]);
  return { certs: certs, categories: matchedCategories };
}
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function displayResults(query) {
  var container = document.getElementById('results');
  container.classList.add('show');
  var result = searchProducts(query);
  var certs = result.certs;
  var countryInfo = countryDB[currentCountry];
  var catDisplay = result.categories.length > 0 ? result.categories[0] : 'general';

  if (certs.length === 0) {
    container.innerHTML = '<div class="empty-state">未找到"' + escHtml(query) + '"的证件信息，请尝试更精确的关键词（例如"水枪"、"动物玩具"）。</div>';
    return;
  }

  var html = '<div class="result-header">';
  html += '<div class="result-title">' + (countryInfo ? countryInfo.flag : '') + ' "' + escHtml(query) + '" - ' + (countryInfo ? countryInfo.name : '') + '</div>';
  if (countryInfo && countryInfo.regulations) html += '<div class="result-regulations">' + countryInfo.regulations + '</div>';
  if (countryInfo && countryInfo.note) html += '<div class="result-note">' + countryInfo.note + '</div>';
  html += '<div class="result-meta">证件数：<span class="badge-count">' + certs.length + '</span> 项 | 分类：<span class="cat-tag">' + catDisplay + '</span></div>';
  html += '</div><div class="cert-list">';

  for (var i = 0; i < certs.length; i++) {
    var cert = certs[i];
    var lc = cert.level === 'required' ? 'level-required' : (cert.level === 'warning' ? 'level-warning' : 'level-conditional');
    var lt = cert.level === 'required' ? '强制' : (cert.level === 'warning' ? '温馨提示' : '条件性');
    var li = cert.level === 'required' ? '✓' : (cert.level === 'warning' ? '⚠' : '○');
    var flag = countryInfo ? countryInfo.flag : '';

    html += '<div class="cert-card">';
    html += '<div class="cert-header">';
    html += '<div class="cert-name">' + flag + ' ' + cert.name + '</div>';
    html += '<div class="cert-level ' + lc + '">' + li + ' ' + lt + '</div>';
    html += '</div>';
    html += '<div class="cert-fullname">' + cert.fullName + '</div>';
    html += '<div class="cert-desc">' + cert.desc + '</div>';
    html += '<div class="cert-meta">费用：<span>' + (cert.cost || '—') + '</span> &nbsp;|&nbsp; 时间：<span>' + (cert.time || '—') + '</span></div>';
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}
