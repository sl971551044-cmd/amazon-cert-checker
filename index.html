<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亚马逊美国站产品认证查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      padding: 40px 20px;
      color: white;
    }
    header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
    header p { font-size: 1.1rem; opacity: 0.9; }
    .search-box {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 15px;
    }
    input[type="text"] {
      flex: 1;
      padding: 16px 24px;
      font-size: 1.1rem;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus { border-color: #667eea; }
    button {
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      padding: 6px 14px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag:hover { background: #667eea; color: white; }
    .results {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: none;
    }
    .results.show { display: block; }
    .category-badge {
      display: inline-block;
      padding: 8px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .cert-grid { display: grid; gap: 15px; }
    .cert-card {
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
    }
    .cert-card:hover { border-color: #667eea; transform: translateX(5px); }
    .cert-card.required { border-left: 4px solid #e74c3c; }
    .cert-card.recommended { border-left: 4px solid #f39c12; }
    .cert-card.optional { border-left: 4px solid #27ae60; }
    .cert-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .cert-name { font-size: 1.2rem; font-weight: 700; color: #333; }
    .cert-level {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .cert-level.required { background: #ffebee; color: #c62828; }
    .cert-level.recommended { background: #fff3e0; color: #e65100; }
    .cert-level.optional { background: #e8f5e9; color: #2e7d32; }
    .cert-desc { color: #666; line-height: 1.6; margin-bottom: 10px; }
    .cert-agency { font-size: 0.85rem; color: #999; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
    .empty-state h3 { font-size: 1.3rem; margin-bottom: 10px; color: #333; }
    footer {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 亚马逊美国站产品认证查询</h1>
      <p>输入产品名称，快速查询出口美国所需的认证要求</p>
    </header>

    <div class="search-box">
      <div class="input-group">
        <input type="text" id="searchInput" placeholder="输入产品名称，如：蓝牙耳机、儿童玩具、LED灯具...">
        <button onclick="search()">查询认证</button>
      </div>
      <div class="tags">
        <span class="tag" onclick="quickSearch('蓝牙耳机')">蓝牙耳机</span>
        <span class="tag" onclick="quickSearch('儿童玩具')">儿童玩具</span>
        <span class="tag" onclick="quickSearch('LED灯具')">LED灯具</span>
        <span class="tag" onclick="quickSearch('充电宝')">充电宝</span>
        <span class="tag" onclick="quickSearch('厨房刀具')">厨房刀具</span>
        <span class="tag" onclick="quickSearch('护肤品')">护肤品</span>
      </div>
    </div>

    <div class="results" id="results">
      <!-- Results will be inserted here -->
    </div>

    <footer>
      <p>数据仅供参考，具体认证要求请以亚马逊官方政策和目标市场法规为准</p>
      <p style="margin-top:8px">© 2024 亚马逊认证助手</p>
    </footer>
  </div>

  <script>
    // Simplified certification database
    const certDB = {
      electronics: {
        name: '电子产品',
        keywords: ['耳机','蓝牙','充电','电子','手机','电脑','平板','音响','音箱','数据线','充电器','适配器','电池','移动电源','充电宝','线材','线缆','插座','开关','显示器','屏幕','键盘','鼠标','摄像头','路由器','网络设备'],
        certs: [
          { name: 'FCC认证', level: 'required', desc: '美国联邦通信委员会认证，所有无线电频率设备必须获得', agency: 'FCC (Federal Communications Commission)' },
          { name: 'UL认证', level: 'recommended', desc: '美国保险商实验室安全认证，电子产品进入美国市场的重要安全认证', agency: 'UL (Underwriters Laboratories)' },
          { name: 'Energy Star', level: 'optional', desc: '能源之星认证，节能产品标识，有助于提升产品竞争力', agency: 'EPA (Environmental Protection Agency)' },
          { name: 'DOE能效认证', level: 'required', desc: '美国能源部能效认证，部分电子产品必须满足能效标准', agency: 'DOE (Department of Energy)' }
        ]
      },
      toys: {
        name: '儿童用品/玩具',
        keywords: ['玩具','儿童','婴儿','宝宝','积木','娃娃','毛绒','益智','爬行','学步','推车','奶瓶','奶嘴','磨牙','咬胶','尿布','纸尿裤','童装','童鞋','童车','安全座椅'],
        certs: [
          { name: 'CPC认证', level: 'required', desc: '儿童产品证书，12岁及以下儿童产品必须提供', agency: 'CPSC (Consumer Product Safety Commission)' },
          { name: 'ASTM F963', level: 'required', desc: '美国玩具安全标准，儿童玩具必须符合此标准', agency: 'ASTM International' },
          { name: 'CPSIA测试', level: 'required', desc: '消费品安全改进法案，检测铅含量和邻苯二甲酸盐', agency: 'CPSC' },
          { name: '追踪标签', level: 'required', desc: '儿童产品必须贴有追踪标签，包含生产日期和批次信息', agency: 'CPSC' }
        ]
      },
      foodContact: {
        name: '食品接触材料',
        keywords: ['餐具','厨具','厨房','食品','食物','保鲜','密封','饭盒','水杯','杯子','碗','盘','筷子','勺子','砧板','刀具','锅','壶','烘焙','烧烤','咖啡','茶具'],
        certs: [
          { name: 'FDA食品接触材料', level: 'required', desc: '美国食品药品监督管理局认证，食品接触材料必须符合', agency: 'FDA (Food and Drug Administration)' },
          { name: 'LFGB测试', level: 'recommended', desc: '德国食品接触材料测试，虽然不是美国法规，但有助于提升产品可信度', agency: 'German LFGB' },
          { name: '加州65号提案', level: 'required', desc: '加州安全饮用水和有毒物质执法法，在加州销售需符合', agency: 'California Proposition 65' }
        ]
      },
      cosmetics: {
        name: '化妆品/护肤品',
        keywords: ['护肤','化妆','美容','面膜','精华','乳液','面霜','眼霜','口红','粉底','眼影','香水','香氛','洗护','洗发','护发','沐浴','香皂','牙膏','牙刷','化妆棉','棉签'],
        certs: [
          { name: 'FDA化妆品注册', level: 'required', desc: '化妆品企业必须在FDA进行设施注册和产品列名', agency: 'FDA' },
          { name: '良好生产规范GMP', level: 'required', desc: '化妆品生产必须符合FDA的良好生产规范', agency: 'FDA' },
          { name: '标签合规', level: 'required', desc: '化妆品标签必须包含成分表、净含量、制造商信息等', agency: 'FDA' },
          { name: '动物测试声明', level: 'recommended', desc: ' cruelty-free声明，部分消费者关注此点', agency: '自愿性' }
        ]
      },
      medical: {
        name: '医疗器械/保健',
        keywords: ['医疗','保健','健康','体温计','血压计','血糖仪','按摩','理疗','康复','护具','口罩','消毒','杀菌','检测','测试','诊断','治疗'],
        certs: [
          { name: 'FDA医疗器械注册', level: 'required', desc: '医疗器械必须在FDA注册，根据风险等级分类管理', agency: 'FDA' },
          { name: '510(k)许可', level: 'required', desc: '中低风险医疗器械上市前通知', agency: 'FDA' },
          { name: 'ISO 13485', level: 'recommended', desc: '医疗器械质量管理体系认证', agency: 'ISO' },
          { name: 'UDI标识', level: 'required', desc: '医疗器械唯一标识系统', agency: 'FDA' }
        ]
      },
      lighting: {
        name: '灯具照明',
        keywords: ['灯','照明','LED','灯泡','台灯','落地灯','吊灯','壁灯','筒灯','射灯','灯带','灯条','路灯','手电','应急灯','智能灯','氛围灯'],
        certs: [
          { name: 'UL认证', level: 'required', desc: '灯具安全认证，进入美国市场的基本要求', agency: 'UL' },
          { name: 'Energy Star', level: 'recommended', desc: '能源之星认证，节能灯具的重要标识', agency: 'EPA' },
          { name: 'DLC认证', level: 'recommended', desc: '设计之光联盟认证，商用LED灯具的重要认证', agency: 'DLC (DesignLights Consortium)' },
          { name: 'FCC认证', level: 'required', desc: '智能灯具含无线功能需FCC认证', agency: 'FCC' }
        ]
      },
      textiles: {
        name: '纺织品/服装',
        keywords: ['服装','衣服','服饰','纺织','面料','T恤','衬衫','裤子','裙子','外套','内衣','袜子','帽子','围巾','手套','家纺','床单','被套','枕套','毛巾','窗帘','地毯'],
        certs: [
          { name: 'CPSIA合规', level: 'required', desc: '儿童服装必须符合CPSIA要求', agency: 'CPSC' },
          { name: '纺织品标签', level: 'required', desc: 'FTC要求的纺织品成分标签和护理标签', agency: 'FTC (Federal Trade Commission)' },
          { name: 'OEKO-TEX', level: 'optional', desc: '纺织品有害物质检测认证', agency: 'OEKO-TEX' },
          { name: '阻燃标准', level: 'required', desc: '特定纺织品需符合阻燃要求', agency: 'CPSC' }
        ]
      },
      automotive: {
        name: '汽车用品',
        keywords: ['汽车','车载','车用','车充','导航','记录仪','胎压','检测','维修','保养','清洁','内饰','外饰','改装','配件','零件','轮胎','机油','滤清器','刹车'],
        certs: [
          { name: 'DOT认证', level: 'required', desc: '美国交通部认证，汽车零部件必须符合', agency: 'DOT (Department of Transportation)' },
          { name: 'SAE标准', level: 'required', desc: '汽车工程师学会标准', agency: 'SAE International' },
          { name: 'EPA认证', level: 'required', desc: '环保署认证，涉及排放的产品需符合', agency: 'EPA' },
          { name: 'CARB认证', level: 'required', desc: '加州空气资源委员会认证', agency: 'CARB' }
        ]
      },
      general: {
        name: '通用日用品',
        keywords: ['家居','日用','生活','收纳','清洁','工具','五金','文具','办公','运动','户外','宠物','礼品','装饰','摆件','钟表','眼镜','箱包','皮具','伞','风扇'],
        certs: [
          { name: 'CPSC安全标准', level: 'required', desc: '消费品安全委员会通用安全要求', agency: 'CPSC' },
          { name: 'ASTM标准', level: 'recommended', desc: '美国材料与试验协会相关标准', agency: 'ASTM' },
          { name: '加州65号提案', level: 'required', desc: '在加州销售需注意有害物质警示', agency: 'California Prop 65' },
          { name: '包装标签', level: 'required', desc: '产品包装需符合美国标签法规', agency: 'FTC/FDA等' }
        ]
      }
    };

    function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      
      const results = findCategory(query);
      displayResults(results, query);
    }

    function quickSearch(term) {
      document.getElementById('searchInput').value = term;
      search();
    }

    function findCategory(query) {
      const queryLower = query.toLowerCase();
      let bestMatch = null;
      let maxScore = 0;

      for (const [key, category] of Object.entries(certDB)) {
        let score = 0;
        for (const keyword of category.keywords) {
          if (queryLower.includes(keyword.toLowerCase())) {
            score += keyword.length;
          }
        }
        if (score > maxScore) {
          maxScore = score;
          bestMatch = category;
        }
      }

      // Fallback to general if no match
      if (!bestMatch || maxScore === 0) {
        bestMatch = certDB.general;
      }

      return { category: bestMatch, score: maxScore };
    }

    function displayResults(result, query) {
      const container = document.getElementById('results');
      container.classList.add('show');

      let html = `<div class="category-badge">${result.category.name}</div>`;
      html += '<div class="cert-grid">';

      for (const cert of result.category.certs) {
        html += `
          <div class="cert-card ${cert.level}">
            <div class="cert-header">
              <span class="cert-name">${cert.name}</span>
              <span class="cert-level ${cert.level}">${cert.level === 'required' ? '必需' : cert.level === 'recommended' ? '推荐' : '可选'}</span>
            </div>
            <div class="cert-desc">${cert.desc}</div>
            <div class="cert-agency">监管机构: ${cert.agency}</div>
          </div>
        `;
      }

      html += '</div>';
      container.innerHTML = html;
    }

    // Enter key support
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
