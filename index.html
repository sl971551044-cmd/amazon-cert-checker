<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亚马逊美国站产品认证查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      padding: 40px 20px;
      color: white;
    }
    header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
    header p { font-size: 1.1rem; opacity: 0.9; }
    header p small { display: block; font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }
    .search-box {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 15px;
    }
    input[type="text"] {
      flex: 1;
      padding: 16px 24px;
      font-size: 1.1rem;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus { border-color: #667eea; }
    button {
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      padding: 6px 14px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag:hover { background: #667eea; color: white; }
    .results {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: none;
    }
    .results.show { display: block; }
    .category-badge {
      display: inline-block;
      padding: 8px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    .category-note {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 18px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-radius: 10px;
    }
    .cert-grid { display: grid; gap: 15px; }
    .cert-card {
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
    }
    .cert-card:hover { 
      border-color: #667eea; 
      transform: translateX(5px);
      box-shadow: 0 4px 12px rgba(102,126,234,0.2);
    }
    .cert-card::after {
      content: '查看详情 →';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #667eea;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .cert-card:hover::after { opacity: 1; }
    .cert-card.required { border-left: 4px solid #e74c3c; }
    .cert-card.recommended { border-left: 4px solid #f39c12; }
    .cert-card.conditional { border-left: 4px solid #3498db; }
    .cert-card.optional { border-left: 4px solid #27ae60; }
    .cert-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      padding-right: 80px;
      gap: 8px;
    }
    .cert-name { font-size: 1.2rem; font-weight: 700; color: #333; }
    .cert-level {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .cert-level.required { background: #ffebee; color: #c62828; }
    .cert-level.recommended { background: #fff3e0; color: #e65100; }
    .cert-level.conditional { background: #e3f2fd; color: #1565c0; }
    .cert-level.optional { background: #e8f5e9; color: #2e7d32; }
    .cert-desc { color: #666; line-height: 1.6; margin-bottom: 10px; }
    .cert-agency { font-size: 0.85rem; color: #999; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
    .empty-state h3 { font-size: 1.3rem; margin-bottom: 10px; color: #333; }
    footer {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }

    /* Modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      overflow-y: auto;
      animation: fadeIn 0.3s ease;
    }
    .modal-overlay.show { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal {
      background: white;
      border-radius: 20px;
      max-width: 700px;
      width: 100%;
      margin: 20px auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.3s ease;
      overflow: hidden;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px 30px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.5rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }
    .modal-close:hover { background: rgba(255,255,255,0.3); }
    .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .modal-subtitle { font-size: 0.95rem; opacity: 0.9; }
    .modal-body { padding: 30px; }
    .modal-section { margin-bottom: 24px; }
    .modal-section:last-child { margin-bottom: 0; }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-content {
      color: #444;
      line-height: 1.7;
      font-size: 0.95rem;
    }
    .section-content ul { padding-left: 20px; margin-top: 6px; }
    .section-content li { margin-bottom: 4px; }
    .modal-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .meta-item { font-size: 0.85rem; }
    .meta-label { color: #999; margin-bottom: 2px; }
    .meta-value { color: #333; font-weight: 600; }
    .modal-link {
      display: inline-block;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .modal-link:hover { background: #5568d3; }
    .level-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 8px;
    }
    .level-tag.required { background: #ffebee; color: #c62828; }
    .level-tag.recommended { background: #fff3e0; color: #e65100; }
    .level-tag.conditional { background: #e3f2fd; color: #1565c0; }
    .level-tag.optional { background: #e8f5e9; color: #2e7d32; }


    
    
    
    
    
    
    .hs-btn:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 8px 20px rgba(0,137,123,0.4) !important;
    }
    
    
    .hs-tag:hover { background: #00897b; color: white; }
    
    .hs-result.show { display: block; }
    
    
    
    
    
    
    .hs-products strong { color: #00695c; }
    
    
    .hs-cert-chip.required { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
    .hs-cert-chip.recommended { background: #fff3e0; color: #e65100; border-color: #ffcc80; }
    .hs-cert-chip.conditional { background: #e3f2fd; color: #1565c0; border-color: #90caf9; }
    .hs-cert-chip.optional { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
    .hs-cert-chip:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
    
    .hs-empty .icon { font-size: 2.5rem; margin-bottom: 10px; }
    
    @media (max-width: 600px) {
      
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.8rem; }
      .input-group { flex-direction: column; }
      .cert-card::after { display: none; }
      .cert-header { padding-right: 0; }
      .modal-body { padding: 20px; }
      .modal-meta { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 亚马逊美国站产品认证查询</h1>
      <p>输入产品名称（中英文均可），查询出口美国所需认证</p>
      <p><small>⚠️ 认证是否为强制/必需完全取决于产品具体属性和销售渠道，结果仅供参考</small></p>
    </header>

    <div class="search-box">
      <div class="input-group">
        <input type="text" id="searchInput" placeholder="输入产品名称，中英文均可，如：heating pad、蓝牙耳机、LED light..." onkeydown="if(event.key==='Enter') search()">
        <button onclick="search()">查询认证</button>
      </div>
      <div class="tags">
        <span class="tag" onclick="quickSearch('蓝牙耳机')">蓝牙耳机</span>
        <span class="tag" onclick="quickSearch('儿童玩具')">儿童玩具</span>
        <span class="tag" onclick="quickSearch('LED灯')">LED灯</span>
        <span class="tag" onclick="quickSearch('充电宝')">充电宝</span>
        <span class="tag" onclick="quickSearch('heating pad')">heating pad</span>
        <span class="tag" onclick="quickSearch('护肤品')">护肤品</span>
      </div>
    </div>

    
    <!-- HS Code 编码查询 -->
    

  <!-- Modal -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <div class="modal-body">
        <div class="modal-meta">
          <div class="meta-item">
            <div class="meta-label">监管机构</div>
            <div class="meta-value" id="modalRegulator"></div>
          </div>
          <div class="meta-item">
            <div class="meta-label">法律依据</div>
            <div class="meta-value" id="modalLaw"></div>
          </div>
          <div class="meta-item">
            <div class="meta-label">预估费用</div>
            <div class="meta-value" id="modalCost"></div>
          </div>
          <div class="meta-item">
            <div class="meta-label">办理周期</div>
            <div class="meta-value" id="modalDuration"></div>
          </div>
        </div>

        <div class="modal-section">
          <div class="section-title">📜 法规依据</div>
          <div class="section-content" id="modalLawText"></div>
        </div>

        <div class="modal-section">
          <div class="section-title">📋 适用产品范围</div>
          <div class="section-content" id="modalScope"></div>
        </div>

        <div class="modal-section">
          <div class="section-title">✅ 核心要求</div>
          <div class="section-content" id="modalRequirements"></div>
        </div>

        <div class="modal-section">
          <div class="section-title">💡 办理建议</div>
          <div class="section-content" id="modalTips"></div>
        </div>

        <div class="modal-section">
          <a id="modalLink" class="modal-link" href="#" target="_blank">🔗 查看官方信息</a>
        </div>
      </div>
    </div>
  </div>

  <script>

    function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      displayResults(query);
    }



    function quickSearch(term) {
      document.getElementById('searchInput').value = term;
      search();
    }


    function findCertById(id) {
      for (const cat of Object.values(certDB)) {
        for (const cert of cat.certs) {
          if (cert.id === id) return cert;
        }
      }
      return null;
    }


    function getCertCategory(id) {
      for (const [key, cat] of Object.entries(certDB)) {
        for (const cert of cat.certs) {
          if (cert.id === id) return { key, name: cat.name };
        }
      }
      return null;
    }


    function searchProducts(query) {
      const q = query.toLowerCase().trim();
      // 把查询词拆成单词（英文分词），用于模糊匹配
      const qWords = q.split(/[\s,，、]+/).filter(w => w.length > 1);
      const matchedCerts = new Map(); // certId → cert object
      const matchedCategories = [];

      // 1. 查产品映射表（支持：整词包含、单词匹配、倒置匹配）
      for (const entry of productMap) {
        let hit = false;
        for (const pattern of entry.patterns) {
          const p = pattern.toLowerCase();
          // 整词匹配：完全相等 或 query包含pattern 或 pattern包含query
          if (q === p || q.includes(p) || p.includes(q)) {
            hit = true; break;
          }
          // 英文分词：查询中任意单词与pattern匹配（解决 heating pad 不匹配 pad 的问题）
          for (const word of qWords) {
            if (word.length > 2 && (p.includes(word) || word === p)) {
              hit = true; break;
            }
            // pattern中的单词也可以匹配query
            const pWords = p.split(/[\s,]+/);
            for (const pw of pWords) {
              if (pw.length > 2 && (q.includes(pw) || pw.includes(q))) {
                hit = true; break;
              }
            }
            if (hit) break;
          }
          if (hit) break;
        }
        if (hit) {
          for (const certId of entry.certIds) {
            const cert = findCertById(certId);
            if (cert) matchedCerts.set(certId, cert);
          }
        }
      }

      // 2. 按分类关键词匹配（作为补充，给出相关分类的认证）
      for (const [key, cat] of Object.entries(certDB)) {
        let score = 0;
        // 中文关键词匹配（完全包含）
        for (const kw of cat.keywords) {
          if (q.includes(kw.toLowerCase())) score += kw.length * 2;
        }
        // 英文关键词匹配（支持分词模糊匹配）
        for (const kw of cat.enKeywords || []) {
          const kwLow = kw.toLowerCase();
          if (q.includes(kwLow)) {
            score += kwLow.length * 2;
          } else {
            // 单词级别的模糊匹配
            for (const word of qWords) {
              if (kwLow.includes(word) || word.includes(kwLow)) {
                score += word.length;
              }
            }
          }
        }
        // 认证名称/ID匹配
        for (const cert of cat.certs) {
          if (q.includes(cert.name.toLowerCase())) score += 8;
          if (cert.id && q.includes(cert.id.toLowerCase())) score += 10;
          // cert.fullName 英文部分匹配
          const fnWords = cert.fullName.toLowerCase().split(/[\s,(]/);
          for (const fw of fnWords) {
            if (fw.length > 3 && q.includes(fw)) score += 3;
          }
        }
        if (score > 0) {
          matchedCategories.push({ key, cat, score });
        }
      }

      // 按匹配度排序，取前4个分类
      matchedCategories.sort((a, b) => b.score - a.score);
      const topMatch = matchedCategories.slice(0, 4);

      // 从相关分类中补充认证（去重，已在productMap中的不重复加）
      for (const { cat } of topMatch) {
        for (const cert of cat.certs) {
          if (!matchedCerts.has(cert.id)) {
            matchedCerts.set(cert.id, cert);
          }
        }
      }

      // 3. 如果完全没有匹配，用通用分类
      if (matchedCerts.size === 0) {
        for (const cert of certDB.general.certs) {
          matchedCerts.set(cert.id, cert);
        }
        if (matchedCategories.length === 0) {
          matchedCategories.push({ key: 'general', cat: certDB.general, score: 0 });
        }
      }

      return {
        certs: Array.from(matchedCerts.values()),
        categories: matchedCategories.length > 0
          ? matchedCategories.map(m => ({ key: m.key, name: m.cat.name, score: m.score }))
          : [{ key: 'general', name: certDB.general.name, score: 0 }],
        firstCategoryKey: matchedCategories.length > 0 ? matchedCategories[0].key : 'general'
      };
    }



    function displayResults(query) {
      const container = document.getElementById('results');
      container.classList.add('show');
      document.getElementById('hsResult').classList.remove('show');

      const result = searchProducts(query);
      const certs = result.certs;

      if (certs.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>未找到匹配结果</h3><p>试试其他关键词，如：蓝牙耳机、儿童玩具、LED灯</p></div>';
        return;
      }

      // 构建分类标签
      const catHtml = result.categories.map(c => 
        `<span class="category-badge" style="margin-right: 8px; margin-bottom: 8px; display: inline-block;">${c.name}</span>`
      ).join('');

      const catNames = result.categories.map(c => c.name).join('、');
      const noteHtml = `<div class="category-note">匹配分类：${catNames}（共${certs.length}个相关认证）</div>`;

      let gridHtml = '<div class="cert-grid">';
      for (const cert of certs) {
        const levelLabel = cert.level === 'required' ? '必需' : 
                           cert.level === 'conditional' ? '视产品而定' :
                           cert.level === 'recommended' ? '推荐' : '可选';
        gridHtml += `
          <div class="cert-card ${cert.level}" onclick="showDetail('${cert.id}')">
            <div class="cert-header">
              <span class="cert-name">${cert.name}</span>
              <span class="cert-level ${cert.level}">${levelLabel}</span>
            </div>
            <div class="cert-desc">${cert.desc}</div>
            <div class="cert-agency">监管机构: ${cert.agency}</div>
          </div>
        `;
      }
      gridHtml += '</div>';

      container.innerHTML = catHtml + noteHtml + gridHtml;
    }



    function showDetail(certId) {
      const cert = findCertById(certId);
      if (!cert) return;

      const levelText = cert.level === 'required' ? '必需认证' : 
                        cert.level === 'conditional' ? '视产品而定' :
                        cert.level === 'recommended' ? '推荐认证' : '可选认证';
      const levelClass = cert.level;

      document.getElementById('modalTitle').textContent = cert.name;
      document.getElementById('modalTitle').innerHTML = 
        cert.name + `<span class="level-tag ${levelClass}">${levelText}</span>`;
      document.getElementById('modalSubtitle').textContent = cert.fullName;
      document.getElementById('modalRegulator').textContent = cert.regulator;
      document.getElementById('modalLaw').textContent = cert.law;
      document.getElementById('modalCost').textContent = cert.cost;
      document.getElementById('modalDuration').textContent = cert.duration;
      document.getElementById('modalLawText').textContent = cert.lawText;

      const scopeEl = document.getElementById('modalScope');
      scopeEl.innerHTML = '';
      const scopeP = document.createElement('div');
      scopeP.textContent = cert.scope;
      scopeEl.appendChild(scopeP);

      const reqEl = document.getElementById('modalRequirements');
      reqEl.innerHTML = '';
      const reqList = document.createElement('ul');
      for (const req of cert.requirements) {
        const li = document.createElement('li');
        li.textContent = req;
        reqList.appendChild(li);
      }
      reqEl.appendChild(reqList);

      document.getElementById('modalTips').textContent = cert.tips || '';

      const linkEl = document.getElementById('modalLink');
      if (cert.link) {
        linkEl.href = cert.link;
        linkEl.target = '_blank';
        linkEl.rel = 'noopener noreferrer';
        linkEl.style.display = 'inline-block';
      } else {
        linkEl.style.display = 'none';
      }

      document.getElementById('modal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }



    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.body.style.overflow = '';
    }

document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // ═══════════════════════════════════════════════════════════════════════
        // 格式：hsCode 前缀 | certIds 认证ID列表 | products 示例品名
    // ═══════════════════════════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════════════════════════
        // ═══════════════════════════════════════════════════════════════════════

</body>
</html>
