<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亚马逊美国站产品认证查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      padding: 40px 20px;
      color: white;
    }
    header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
    header p { font-size: 1.1rem; opacity: 0.9; }
    header p small { display: block; font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }
    .search-box {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 15px;
    }
    input[type="text"] {
      flex: 1;
      padding: 16px 24px;
      font-size: 1.1rem;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus { border-color: #667eea; }
    button {
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      padding: 6px 14px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag:hover { background: #667eea; color: white; }
    .results {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: none;
    }
    .results.show { display: block; }
    .category-badge {
      display: inline-block;
      padding: 8px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    .category-note {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 18px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-radius: 10px;
    }
    .cert-grid { display: grid; gap: 15px; }
    .cert-card {
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
    }
    .cert-card:hover { 
      border-color: #667eea; 
      transform: translateX(5px);
      box-shadow: 0 4px 12px rgba(102,126,234,0.2);
    }
    .cert-card::after {
      content: '查看详情 →';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #667eea;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .cert-card:hover::after { opacity: 1; }
    .cert-card.required { border-left: 4px solid #e74c3c; }
    .cert-card.recommended { border-left: 4px solid #f39c12; }
    .cert-card.conditional { border-left: 4px solid #3498db; }
    .cert-card.optional { border-left: 4px solid #27ae60; }
    .cert-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      padding-right: 80px;
      gap: 8px;
    }
    .cert-name { font-size: 1.2rem; font-weight: 700; color: #333; }
    .cert-level {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .cert-level.required { background: #ffebee; color: #c62828; }
    .cert-level.recommended { background: #fff3e0; color: #e65100; }
    .cert-level.conditional { background: #e3f2fd; color: #1565c0; }
    .cert-level.optional { background: #e8f5e9; color: #2e7d32; }
    .cert-desc { color: #666; line-height: 1.6; margin-bottom: 10px; }
    .cert-agency { font-size: 0.85rem; color: #999; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
    .empty-state h3 { font-size: 1.3rem; margin-bottom: 10px; color: #333; }
    footer {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }

    /* Modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      overflow-y: auto;
      animation: fadeIn 0.3s ease;
    }
    .modal-overlay.show { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal {
      background: white;
      border-radius: 20px;
      max-width: 700px;
      width: 100%;
      margin: 20px auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.3s ease;
      overflow: hidden;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px 30px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.5rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }
    .modal-close:hover { background: rgba(255,255,255,0.3); }
    .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .modal-subtitle { font-size: 0.95rem; opacity: 0.9; }
    .modal-body { padding: 30px; }
    .modal-section { margin-bottom: 24px; }
    .modal-section:last-child { margin-bottom: 0; }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-content {
      color: #444;
      line-height: 1.7;
      font-size: 0.95rem;
    }
    .section-content ul { padding-left: 20px; margin-top: 6px; }
    .section-content li { margin-bottom: 4px; }
    .modal-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .meta-item { font-size: 0.85rem; }
    .meta-label { color: #999; margin-bottom: 2px; }
    .meta-value { color: #333; font-weight: 600; }
    .modal-link {
      display: inline-block;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .modal-link:hover { background: #5568d3; }
    .level-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 8px;
    }
    .level-tag.required { background: #ffebee; color: #c62828; }
    .level-tag.recommended { background: #fff3e0; color: #e65100; }
    .level-tag.conditional { background: #e3f2fd; color: #1565c0; }
    .level-tag.optional { background: #e8f5e9; color: #2e7d32; }


    
    
    
    
    
    
    .hs-btn:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 8px 20px rgba(0,137,123,0.4) !important;
    }
    
    
    .hs-tag:hover { background: #00897b; color: white; }
    
    .hs-result.show { display: block; }
    
    
    
    
    
    
    .hs-products strong { color: #00695c; }
    
    
    .hs-cert-chip.required { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
    .hs-cert-chip.recommended { background: #fff3e0; color: #e65100; border-color: #ffcc80; }
    .hs-cert-chip.conditional { background: #e3f2fd; color: #1565c0; border-color: #90caf9; }
    .hs-cert-chip.optional { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
    .hs-cert-chip:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
    
    .hs-empty .icon { font-size: 2.5rem; margin-bottom: 10px; }
    
    @media (max-width: 600px) {
      
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.8rem; }
      .input-group { flex-direction: column; }
      .cert-card::after { display: none; }
      .cert-header { padding-right: 0; }
      .modal-body { padding: 20px; }
      .modal-meta { grid-template-columns: 1fr; }
    }
  </style>

</div>

    // 按ID查找认证对象
    function findCertById(id) {
      for (const cat of Object.values(certDB)) {
        for (const cert of cat.certs) {
          if (cert.id === id) return cert;
        }
      }
      return null;
    }

    // 获取某认证所在的分类
    function getCertCategory(id) {
      for (const [key, cat] of Object.entries(certDB)) {
        for (const cert of cat.certs) {
          if (cert.id === id) return { key, name: cat.name };
        }
      }
      return null;
    }

var currentCountry = 'US';

function switchCountry(c) {
  currentCountry = c;
  document.querySelectorAll('.country-tab').forEach(function(b) {
    b.classList.toggle('active', b.dataset.country === c);
  });
  var q = document.getElementById('searchInput').value.trim();
  if (q) displayResults(q);
}

function getCertByIdInDB(id) {
  var db = countryDB[currentCountry];
  if (!db) return null;
  for (var i = 0; i < db.certs.length; i++) {
    if (db.certs[i].id === id) return db.certs[i];
  }
  return null;
}

function searchProducts(query) {
  var q = query.toLowerCase().trim();
  var qWords = q.split(/[\s,，、]+/).filter(function(w){ return w.length > 1; });
  var matchedCerts = {};
  var matchedCategories = [];

  for (var i = 0; i < productMap.length; i++) {
    var entry = productMap[i];
    var hit = false;
    for (var j = 0; j < entry.patterns.length; j++) {
      var p = entry.patterns[j].toLowerCase();
      if (q === p || q.indexOf(p) >= 0 || p.indexOf(q) >= 0) { hit = true; break; }
    }
    if (hit) {
      matchedCategories.push(entry.category || 'kids-general');
      var catCerts = countryProductMap[entry.category] || {};
      var countryCerts = catCerts[currentCountry] || [];
      for (var k = 0; k < countryCerts.length; k++) {
        var cid = countryCerts[k];
        var cert = getCertByIdInDB(cid);
        if (cert) matchedCerts[cid] = cert;
      }
    }
  }

  if (typeof enKeywordCertMap !== 'undefined') {
    for (var kw in enKeywordCertMap) {
      var kwL = kw.toLowerCase();
      if (qWords.indexOf(kwL) >= 0 || q.indexOf(kwL) >= 0) {
        var cids = enKeywordCertMap[kw];
        for (var ci = 0; ci < cids.length; ci++) {
          var cid2 = cids[ci];
          if (!matchedCerts[cid2]) {
            var cert2 = getCertByIdInDB(cid2);
            if (cert2) matchedCerts[cid2] = cert2;
          }
        }
      }
    }
  }

  var certs = [];
  for (var id in matchedCerts) certs.push(matchedCerts[id]);
  return { certs: certs, categories: matchedCategories };
}


function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function displayResults(query) {
  var container = document.getElementById('results');
  container.classList.add('show');
  var result = searchProducts(query);
  var certs = result.certs;
  var countryInfo = countryDB[currentCountry];
  var catDisplay = result.categories.length > 0 ? result.categories[0] : 'general';

  if (certs.length === 0) {
    container.innerHTML = '<div class="empty-state">未找到"' + escHtml(query) + '"的证件信息，请尝试更精确的关键词（例如"水枪"、"动物玩具"）。</div>';
    return;
  }

  var html = '<div class="result-header">';
  html += '<div class="result-title">' + (countryInfo ? countryInfo.flag : '') + ' "' + escHtml(query) + '" - ' + (countryInfo ? countryInfo.name : '') + '</div>';
  if (countryInfo && countryInfo.regulations) html += '<div class="result-regulations">' + countryInfo.regulations + '</div>';
  if (countryInfo && countryInfo.note) html += '<div class="result-note">' + countryInfo.note + '</div>';
  html += '<div class="result-meta">证件数：<span class="badge-count">' + certs.length + '</span> 项 | 分类：<span class="cat-tag">' + catDisplay + '</span></div>';
  html += '</div><div class="cert-list">';

  for (var i = 0; i < certs.length; i++) {
    var cert = certs[i];
    var lc = cert.level === 'required' ? 'level-required' : (cert.level === 'warning' ? 'level-warning' : 'level-conditional');
    var lt = cert.level === 'required' ? '强制' : (cert.level === 'warning' ? '温馨提示' : '条件性');
    var li = cert.level === 'required' ? '✓' : (cert.level === 'warning' ? '⚠' : '○');
    var isGen = (cert.id === 'gcc' || cert.id === 'doc' || cert.id === 'uk-doc' || cert.id === 'cpc' || cert.id === 'ccpsa');
    var flag = countryInfo ? countryInfo.flag : '';

    html += '<div class="cert-card">';
    html += '<div class="cert-header">';
    html += '<div class="cert-name">' + flag + ' ' + cert.name + '</div>';
    html += '<div class="cert-level ' + lc + '">' + li + ' ' + lt + '</div>';
    html += '</div>';
    html += '<div class="cert-fullname">' + cert.fullName + '</div>';
    html += '<div class="cert-desc">' + cert.desc + '</div>';
    html += '<div class="cert-meta">费用：<span>' + (cert.cost || '—') + '</span> &nbsp;|&nbsp; 时间：<span>' + (cert.time || '—') + '</span></div>';
    if (isGen) {
      html += '<div class="gcc-btn-wrap">';
      html += '<button class="gcc-btn" onclick="openGccModal(\'' + cert.id + '\', \'' + cert.name.replace(/'/g,"\\'") + '\')">✨ 自动生成' + cert.name + '文档</button>';
      html += '</div>';
    }
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

      '<p>I hereby certify that the above product conforms to all applicable requirements of ' + (countryDB[currentCountry] ? countryDB[currentCountry].name : currentCountry) + '.</p><p>Date: ' + dateStr + '</p></div>';
  }

  var fullDoc = header + body +
    '<div class="doc-footer">生成日期：' + dateStr + ' | ' + company + ' | 本文档仅供参考，请根据实际测试结果填写。<br>Generated by Amazon Cert Checker | 本生成文档不替代官方证书，生成后请调整内容。</div>';

  out.innerHTML = fullDoc +
    '<div class="doc-actions">' +
    '<button class="btn-primary" onclick="downloadGCC()">↓ 下载TXT文档</button>' +
    '<button class="btn-secondary" onclick="copyGCC()">📋 复制文本</button>' +
    '<button class="btn-secondary" onclick="printGCC()">🖨️ 打印PDF</button>' +
    '</div>';
  var okBtn2 = document.getElementById('modal-ok-btn2');
  if (okBtn2) okBtn2.style.display = 'inline-block';
}

function downloadGCC() {
  var out = document.getElementById('gcc-output');
  var text = out.innerText || out.textContent || '';
  var blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var name = _gcd ? _gcd.certName.replace(/[^a-zA-Z0-9]/g,'_') : 'CERT';
  a.download = name + '_Certificate_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
}

function copyGCC() {
  var out = document.getElementById('gcc-output');
  var text = out.innerText || out.textContent || '';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.querySelector('button[onclick="copyGCC()"]');
      if (btn) { var orig = btn.textContent; btn.textContent = '✓ 已复制!'; setTimeout(function(){ btn.textContent = orig; }, 2000); }
    }).catch(function(){ alert('复制失败'); });
  }
}

function printGCC() {
  var out = document.getElementById('gcc-output');
  var w = window.open('', '_blank');
  w.document.write('<html><head><meta charset="utf-8"><title>' + (_gcd ? _gcd.certName : 'Certificate') + '</title><style>' +
    'body{font-family:Georgia,"Times New Roman",serif;padding:40px;max-width:800px;margin:0 auto;line-height:1.7;color:#222;}' +
    '.doc-title{font-size:20px;font-weight:bold;text-align:center;border-bottom:2px solid #222;padding-bottom:10px;margin-bottom:6px;}' +
    '.doc-subtitle{text-align:center;color:#555;font-size:12px;margin-bottom:24px;}' +
    '.doc-section{margin-bottom:16px;}' +
    '.doc-section-title{font-weight:bold;font-size:13px;border-bottom:1px solid #ccc;padding:5px 8px;background:#f8f8f8;margin-bottom:8px;}' +
    '.doc-table{width:100%;border-collapse:collapse;}' +
    '.doc-table td{padding:4px 8px;border:1px solid #ddd;font-size:13px;}' +
    '.doc-table td:first-child{width:30%;font-weight:bold;background:#fafafa;}' +
    '.doc-list li{margin-bottom:4px;font-size:13px;}' +
    '.doc-footer{border-top:1px solid #ccc;padding-top:10px;margin-top:20px;font-size:11px;color:#999;text-align:center;line-height:1.8;}' +
    '@media print{body{padding:20px;}}' +
    '</style></head><body>' + out.innerHTML + '</body></html>');
  w.document.close();
  w.print();
}

function closeModal() {
  var modal = document.getElementById('modal');
  if (modal) modal.classList.remove('show');
  document.body.style.overflow = '';
}


function displayResults(query) {
      const container = document.getElementById('results');
      container.classList.add('show');

      const result = searchProducts(query);
      const certs = result.certs;

      if (certs.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>未找到匹配结果</h3><p>试试其他关键词，如：蓝牙耳机、儿童玩具、LED灯</p></div>';
        return;
      }

      // 构建分类标签
      const catHtml = result.categories.map(c => 
        `<span class="category-badge" style="margin-right: 8px; margin-bottom: 8px; display: inline-block;">${c.name}</span>`
      ).join('');

      const catNames = result.categories.map(c => c.name).join('、');
      const noteHtml = `<div class="category-note">匹配分类：${catNames}（共${certs.length}个相关认证）</div>`;

      let gridHtml = '<div class="cert-grid">';
      for (const cert of certs) {
        const levelLabel = cert.level === 'required' ? '必需' : 
                           cert.level === 'conditional' ? '视产品而定' :
                           cert.level === 'recommended' ? '推荐' : '可选';
        gridHtml += `
          <div class="cert-card ${cert.level}" onclick="showDetail('${cert.id}')">
            <div class="cert-header">
              <span class="cert-name">${cert.name}</span>
              <span class="cert-level ${cert.level}">${levelLabel}</span>
            </div>
            <div class="cert-desc">${cert.desc}</div>
            <div class="cert-agency">监管机构: ${cert.agency}</div>
          </div>
        `;
      }
      gridHtml += '</div>';

      container.innerHTML = catHtml + noteHtml + gridHtml;
    }

    function showDetail(certId) {
      const cert = findCertById(certId);
      if (!cert) return;

      const levelText = cert.level === 'required' ? '必需认证' : 
                        cert.level === 'conditional' ? '视产品而定' :
                        cert.level === 'recommended' ? '推荐认证' : '可选认证';
      const levelClass = cert.level;

      document.getElementById('modalTitle').textContent = cert.name;
      document.getElementById('modalTitle').innerHTML = 
        cert.name + `<span class="level-tag ${levelClass}">${levelText}</span>`;
      document.getElementById('modalSubtitle').textContent = cert.fullName;
      document.getElementById('modalRegulator').textContent = cert.regulator;
      document.getElementById('modalLaw').textContent = cert.law;
      document.getElementById('modalCost').textContent = cert.cost;
      document.getElementById('modalDuration').textContent = cert.duration;
      document.getElementById('modalLawText').textContent = cert.lawText;

      const scopeEl = document.getElementById('modalScope');
      scopeEl.innerHTML = '';
      const scopeP = document.createElement('div');
      scopeP.textContent = cert.scope;
      scopeEl.appendChild(scopeP);

      const reqEl = document.getElementById('modalRequirements');
      reqEl.innerHTML = '';
      const reqList = document.createElement('ul');
      for (const req of cert.requirements) {
        const li = document.createElement('li');
        li.textContent = req;
        reqList.appendChild(li);
      }
      reqEl.appendChild(reqList);

      document.getElementById('modalTips').textContent = cert.tips || '';

      const linkEl = document.getElementById('modalLink');
      if (cert.link) {
        linkEl.href = cert.link;
        linkEl.target = '_blank';
        linkEl.rel = 'noopener noreferrer';
        linkEl.style.display = 'inline-block';
      } else {
        linkEl.style.display = 'none';
      }

      document.getElementById('modal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
