    function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      
      const results = findCategory(query);
      displayResults(results, query);
    }

    function quickSearch(term) {
      document.getElementById('searchInput').value = term;
      search();
    }

    function findCategory(query) {
      const queryLower = query.toLowerCase();
      let bestMatch = null;
      let maxScore = 0;

      for (const [key, category] of Object.entries(certDB)) {
        let score = 0;
        for (const keyword of category.keywords) {
          if (queryLower.includes(keyword.toLowerCase())) {
            score += keyword.length;
          }
        }
        if (score > maxScore) {
          maxScore = score;
          bestMatch = category;
        }
      }

      // Fallback to general if no match
      if (!bestMatch || maxScore === 0) {
        bestMatch = certDB.general;
      }

      return { category: bestMatch, score: maxScore };
    }

    function displayResults(result, query) {
      const container = document.getElementById('results');
      container.classList.add('show');

      let html = `<div class="category-badge">${result.category.name}</div>`;
      html += '<div class="cert-grid">';

      for (const cert of result.category.certs) {
        html += `
          <div class="cert-card ${cert.level}" onclick="showDetail('${cert.id}')">
            <div class="cert-header">
              <span class="cert-name">${cert.name}</span>
              <span class="cert-level ${cert.level}">${cert.level === 'required' ? '必需' : cert.level === 'recommended' ? '推荐' : '可选'}</span>
            </div>
            <div class="cert-desc">${cert.desc}</div>
            <div class="cert-agency">监管机构: ${cert.agency}</div>
          </div>
        `;
      }

      html += '</div>';
      container.innerHTML = html;
    }

    function showDetail(certId) {
      // Find the certification by ID
      let foundCert = null;
      for (const cat of Object.values(certDB)) {
        for (const cert of cat.certs) {
          if (cert.id === certId) {
            foundCert = cert;
            break;
          }
        }
        if (foundCert) break;
      }

      if (!foundCert) return;

      const levelText = foundCert.level === 'required' ? '必需认证' : 
                       foundCert.level === 'recommended' ? '推荐认证' : '可选认证';
      const levelClass = foundCert.level;

      // Set modal content using textContent to avoid HTML injection
      document.getElementById('modalTitle').textContent = foundCert.name;
      document.getElementById('modalTitle').innerHTML = 
        foundCert.name + `<span class="level-tag ${levelClass}">${levelText}</span>`;
      document.getElementById('modalSubtitle').textContent = foundCert.fullName;
      document.getElementById('modalRegulator').textContent = foundCert.regulator;
      document.getElementById('modalLaw').textContent = foundCert.law;
      document.getElementById('modalCost').textContent = foundCert.cost;
      document.getElementById('modalDuration').textContent = foundCert.duration;
      document.getElementById('modalLawText').textContent = foundCert.lawText;

      // Scope
      const scopeEl = document.getElementById('modalScope');
      scopeEl.innerHTML = '';
      const scopeP = document.createElement('div');
      scopeP.textContent = foundCert.scope;
      scopeEl.appendChild(scopeP);

      // Requirements
      const reqEl = document.getElementById('modalRequirements');
      reqEl.innerHTML = '';
      const reqList = document.createElement('ul');
      for (const req of foundCert.requirements) {
        const li = document.createElement('li');
        li.textContent = req;
        reqList.appendChild(li);
      }
      reqEl.appendChild(reqList);

      // Tips
      document.getElementById('modalTips').textContent = foundCert.tips;

      // Link
      const linkEl = document.getElementById('modalLink');
      linkEl.href = foundCert.link;
      linkEl.target = '_blank';
      linkEl.rel = 'noopener noreferrer';

      // Show modal
      document.getElementById('modal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.body.style.overflow = '';
    }

    // Close modal on ESC key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // Enter key support
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') search();
    });
  </script>
